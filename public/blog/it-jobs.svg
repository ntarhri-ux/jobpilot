<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#142842"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg6)"/>
  <!-- Code brackets -->
  <text x="120" y="200" fill="white" font-family="monospace" font-size="100" opacity="0.08">&lt;/&gt;</text>
  <text x="520" y="180" fill="#D4A843" font-family="monospace" font-size="60" opacity="0.1">{...}</text>
  <!-- Monitor -->
  <rect x="260" y="60" width="280" height="180" rx="12" fill="#0D1B2A" stroke="white" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Screen content - code lines -->
  <rect x="285" y="85" width="100" height="6" rx="3" fill="#C1121F" opacity="0.6"/>
  <rect x="285" y="100" width="150" height="6" rx="3" fill="#D4A843" opacity="0.5"/>
  <rect x="300" y="115" width="120" height="6" rx="3" fill="white" opacity="0.3"/>
  <rect x="300" y="130" width="90" height="6" rx="3" fill="#4FC3F7" opacity="0.4"/>
  <rect x="300" y="145" width="140" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="285" y="160" width="80" height="6" rx="3" fill="#C1121F" opacity="0.4"/>
  <rect x="285" y="175" width="130" height="6" rx="3" fill="#D4A843" opacity="0.3"/>
  <rect x="300" y="190" width="100" height="6" rx="3" fill="white" opacity="0.2"/>
  <!-- Cursor blinking -->
  <rect x="400" y="190" width="2" height="10" fill="#D4A843" opacity="0.8"/>
  <!-- Monitor stand -->
  <rect x="380" y="240" width="40" height="20" fill="#6B7280" opacity="0.3"/>
  <rect x="350" y="258" width="100" height="8" rx="4" fill="#6B7280" opacity="0.3"/>
  <!-- Floating tech icons -->
  <g transform="translate(160,100)" opacity="0.4">
    <rect x="-15" y="-15" width="30" height="30" rx="6" fill="white" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" fill="white" font-family="monospace" font-size="14">JS</text>
  </g>
  <g transform="translate(640,90)" opacity="0.4">
    <rect x="-15" y="-15" width="30" height="30" rx="6" fill="#4FC3F7" opacity="0.2"/>
    <text x="0" y="6" text-anchor="middle" fill="white" font-family="monospace" font-size="14">TS</text>
  </g>
  <g transform="translate(180,250)" opacity="0.3">
    <rect x="-18" y="-12" width="36" height="24" rx="5" fill="#D4A843" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="monospace" font-size="11">API</text>
  </g>
  <g transform="translate(630,230)" opacity="0.3">
    <rect x="-15" y="-15" width="30" height="30" rx="15" fill="#C1121F" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="monospace" font-size="10">AI</text>
  </g>
  <!-- Location pin for Frankfurt -->
  <g transform="translate(700,150)" opacity="0.4">
    <path d="M0,-15 C8,-15 12,-8 12,0 C12,8 0,20 0,20 C0,20 -12,8 -12,0 C-12,-8 -8,-15 0,-15Z" fill="#C1121F"/>
    <circle cx="0" cy="-2" r="4" fill="white"/>
  </g>
  <text x="400" y="320" text-anchor="middle" fill="white" font-family="system-ui" font-size="22" font-weight="bold" opacity="0.9">IT-Jobs im Rhein-Main-Gebiet</text>
  <text x="400" y="348" text-anchor="middle" fill="#D4A843" font-family="system-ui" font-size="14" opacity="0.7">Frankfurt • Wiesbaden • Darmstadt</text>
</svg>
