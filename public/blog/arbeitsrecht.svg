<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2A5080"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg7)"/>
  <!-- Scale of justice -->
  <line x1="400" y1="60" x2="400" y2="200" stroke="#D4A843" stroke-width="4"/>
  <circle cx="400" cy="55" r="10" fill="#D4A843"/>
  <!-- Balance beam -->
  <line x1="260" y1="140" x2="540" y2="160" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
  <!-- Left plate -->
  <path d="M220,140 L300,140 L290,170 Q275,185 245,185 L230,170 Z" fill="white" opacity="0.2"/>
  <rect x="230" y="155" width="50" height="8" rx="2" fill="white" opacity="0.15"/>
  <!-- Right plate -->
  <path d="M500,160 L580,160 L570,190 Q555,205 525,205 L510,190 Z" fill="white" opacity="0.2"/>
  <rect x="510" y="175" width="50" height="8" rx="2" fill="white" opacity="0.15"/>
  <!-- Base -->
  <rect x="370" y="195" width="60" height="10" rx="3" fill="#D4A843" opacity="0.6"/>
  <rect x="350" y="202" width="100" height="8" rx="4" fill="#D4A843" opacity="0.4"/>
  <!-- Gavel -->
  <g transform="translate(580,100) rotate(-20)">
    <rect x="-8" y="-25" width="16" height="25" rx="3" fill="#8B6914"/>
    <rect x="-3" y="0" width="6" height="35" rx="2" fill="#A07B1F"/>
  </g>
  <!-- Document / law book -->
  <g transform="translate(170,180)">
    <rect x="-30" y="-40" width="60" height="80" rx="4" fill="white" opacity="0.15"/>
    <text x="0" y="-10" text-anchor="middle" fill="white" font-family="serif" font-size="16" opacity="0.3">§</text>
    <rect x="-20" y="5" width="40" height="3" rx="1" fill="white" opacity="0.1"/>
    <rect x="-20" y="13" width="35" height="3" rx="1" fill="white" opacity="0.1"/>
    <rect x="-20" y="21" width="38" height="3" rx="1" fill="white" opacity="0.1"/>
  </g>
  <!-- Paragraph symbols -->
  <text x="650" y="280" fill="white" font-family="serif" font-size="40" opacity="0.08">§§</text>
  <text x="120" y="120" fill="white" font-family="serif" font-size="30" opacity="0.06">§</text>
  <!-- Shield -->
  <g transform="translate(400,280)" opacity="0.3">
    <path d="M0,-25 L20,-15 L20,10 Q20,25 0,30 Q-20,25 -20,10 L-20,-15 Z" fill="#C1121F"/>
    <path d="M-6,2 L-2,8 L8,-5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <text x="400" y="340" text-anchor="middle" fill="white" font-family="system-ui" font-size="22" font-weight="bold" opacity="0.9">Deine Rechte als Arbeitnehmer</text>
  <text x="400" y="368" text-anchor="middle" fill="#D4A843" font-family="system-ui" font-size="14" opacity="0.7">Arbeitsrecht verständlich erklärt</text>
</svg>
