<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2A5080"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg5)"/>
  <!-- Road / path -->
  <path d="M100,350 Q250,250 400,200 Q550,150 700,80" stroke="white" stroke-width="6" fill="none" opacity="0.2" stroke-linecap="round"/>
  <path d="M100,350 Q250,250 400,200 Q550,150 700,80" stroke="#D4A843" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="12,8" stroke-linecap="round"/>
  <!-- Person walking -->
  <g transform="translate(380,180)">
    <circle cx="0" cy="-30" r="16" fill="#E8D5B7"/>
    <rect x="-12" y="-12" width="24" height="30" rx="6" fill="#C1121F" opacity="0.8"/>
    <!-- Briefcase -->
    <rect x="16" y="0" width="18" height="14" rx="3" fill="#D4A843"/>
    <rect x="21" y="-4" width="8" height="6" rx="2" fill="none" stroke="#D4A843" stroke-width="2"/>
  </g>
  <!-- Door at the end -->
  <g transform="translate(670,50)">
    <rect x="-20" y="-10" width="40" height="60" rx="3" fill="white" opacity="0.3"/>
    <circle cx="12" cy="20" r="3" fill="#D4A843"/>
    <rect x="-15" y="0" width="30" height="3" rx="1" fill="white" opacity="0.2"/>
  </g>
  <!-- Stepping stones -->
  <circle cx="200" cy="300" r="12" fill="white" opacity="0.1"/>
  <circle cx="300" cy="250" r="12" fill="white" opacity="0.15"/>
  <circle cx="500" cy="160" r="12" fill="white" opacity="0.15"/>
  <circle cx="600" cy="120" r="12" fill="white" opacity="0.1"/>
  <!-- Sun / light -->
  <circle cx="700" cy="60" r="30" fill="#D4A843" opacity="0.2"/>
  <circle cx="700" cy="60" r="20" fill="#D4A843" opacity="0.3"/>
  <!-- Text labels -->
  <text x="130" y="330" fill="white" font-family="system-ui" font-size="11" opacity="0.4">Start</text>
  <text x="670" y="130" fill="#D4A843" font-family="system-ui" font-size="11" opacity="0.5">Neuer Job</text>
  <text x="400" y="320" text-anchor="middle" fill="white" font-family="system-ui" font-size="22" font-weight="bold" opacity="0.9">Beruflicher Wiedereinstieg</text>
  <text x="400" y="348" text-anchor="middle" fill="#D4A843" font-family="system-ui" font-size="14" opacity="0.7">Dein Weg zurück in den Beruf</text>
</svg>
