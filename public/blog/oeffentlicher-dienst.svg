<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#142842"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg8)"/>
  <!-- Government building -->
  <rect x="280" y="120" width="240" height="150" fill="white" opacity="0.12"/>
  <!-- Columns -->
  <rect x="300" y="130" width="16" height="130" rx="3" fill="white" opacity="0.15"/>
  <rect x="340" y="130" width="16" height="130" rx="3" fill="white" opacity="0.15"/>
  <rect x="380" y="130" width="16" height="130" rx="3" fill="white" opacity="0.15"/>
  <rect x="420" y="130" width="16" height="130" rx="3" fill="white" opacity="0.15"/>
  <rect x="460" y="130" width="16" height="130" rx="3" fill="white" opacity="0.15"/>
  <!-- Roof / triangle -->
  <polygon points="260,125 400,55 540,125" fill="white" opacity="0.12"/>
  <polygon points="275,125 400,65 525,125" fill="white" opacity="0.06"/>
  <!-- Door -->
  <rect x="375" y="215" width="50" height="55" rx="25" fill="white" opacity="0.1"/>
  <!-- German flag colors subtly -->
  <rect x="260" y="270" width="280" height="4" fill="#000" opacity="0.15"/>
  <rect x="260" y="274" width="280" height="4" fill="#C1121F" opacity="0.3"/>
  <rect x="260" y="278" width="280" height="4" fill="#D4A843" opacity="0.3"/>
  <!-- Bundesadler simplified -->
  <g transform="translate(400,95)" opacity="0.2">
    <circle cx="0" cy="-5" r="6" fill="#D4A843"/>
    <path d="M-15,5 Q0,15 15,5" stroke="#D4A843" stroke-width="2" fill="none"/>
  </g>
  <!-- Documents -->
  <g transform="translate(620,160)">
    <rect x="-25" y="-35" width="50" height="70" rx="4" fill="white" opacity="0.15"/>
    <rect x="-15" y="-20" width="30" height="4" rx="2" fill="white" opacity="0.1"/>
    <rect x="-15" y="-10" width="25" height="4" rx="2" fill="white" opacity="0.1"/>
    <rect x="-15" y="0" width="28" height="4" rx="2" fill="white" opacity="0.1"/>
    <rect x="-15" y="15" width="30" height="8" rx="2" fill="#C1121F" opacity="0.2"/>
  </g>
  <!-- Stamp -->
  <g transform="translate(170,200)" opacity="0.3">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#C1121F" stroke-width="3"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#C1121F" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#C1121F" font-family="system-ui" font-size="10" font-weight="bold">TVöD</text>
  </g>
  <text x="400" y="330" text-anchor="middle" fill="white" font-family="system-ui" font-size="22" font-weight="bold" opacity="0.9">Bewerbung im Öffentlichen Dienst</text>
  <text x="400" y="358" text-anchor="middle" fill="#D4A843" font-family="system-ui" font-size="14" opacity="0.7">Besonderheiten & Tipps</text>
</svg>
