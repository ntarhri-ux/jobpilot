<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2A5080"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)"/>
  <!-- Desk -->
  <rect x="150" y="220" width="500" height="12" rx="6" fill="#D4A843" opacity="0.8"/>
  <!-- Person left (interviewer) -->
  <circle cx="280" cy="150" r="35" fill="#E8D5B7"/>
  <rect x="248" y="190" width="64" height="50" rx="8" fill="#2A5080"/>
  <rect x="255" y="195" width="50" height="10" rx="2" fill="#D4A843" opacity="0.5"/>
  <!-- Person right (candidate) -->
  <circle cx="520" cy="150" r="35" fill="#E8D5B7"/>
  <rect x="488" y="190" width="64" height="50" rx="8" fill="#C1121F"/>
  <!-- Document on desk -->
  <rect x="360" y="200" width="80" height="25" rx="3" fill="white" opacity="0.9"/>
  <rect x="370" y="207" width="40" height="3" rx="1" fill="#1E3A5F" opacity="0.3"/>
  <rect x="370" y="213" width="55" height="3" rx="1" fill="#1E3A5F" opacity="0.3"/>
  <!-- Speech bubble -->
  <rect x="330" y="90" width="140" height="40" rx="12" fill="white" opacity="0.15"/>
  <polygon points="380,130 370,140 395,130" fill="white" opacity="0.15"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="3" fill="#D4A843" opacity="0.6"/>
  <circle cx="700" cy="60" r="4" fill="#D4A843" opacity="0.5"/>
  <circle cx="650" cy="320" r="3" fill="white" opacity="0.3"/>
  <circle cx="120" cy="300" r="2" fill="white" opacity="0.2"/>
  <!-- Checkmarks -->
  <g transform="translate(600,100)" opacity="0.3">
    <circle cx="0" cy="0" r="15" fill="white"/>
    <path d="M-6,0 L-2,5 L7,-5" stroke="#1E3A5F" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(630,145)" opacity="0.2">
    <circle cx="0" cy="0" r="12" fill="white"/>
    <path d="M-5,0 L-1,4 L6,-4" stroke="#1E3A5F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Bottom text area -->
  <text x="400" y="310" text-anchor="middle" fill="white" font-family="system-ui" font-size="22" font-weight="bold" opacity="0.9">Vorstellungsgespräch meistern</text>
  <text x="400" y="340" text-anchor="middle" fill="#D4A843" font-family="system-ui" font-size="14" opacity="0.8">10 Tipps für deinen Erfolg</text>
</svg>
